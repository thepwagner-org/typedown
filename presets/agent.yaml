description: >-
  An agent definition (OpenCode or Claude Code). The markdown body is the
  system prompt. Frontmatter configures model, tools, and permissions.
paths:
  - "agents/*.md"
  - ".claude/agents/*.md"

fields:
  description:
    type: string
    required: true
  mode:
    type: enum
    values: [primary, subagent, all]
  model:
    type: string
  hidden:
    type: bool
  steps:
    type: integer
  color:
    type: string
  name:
    type: string
  tools:
    type: string
  skills:
    type: string
  allowed-tools:
    type: string

structure:
  title: none
  strict_sections: false
