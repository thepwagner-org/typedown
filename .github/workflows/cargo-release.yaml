name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7  # stable
        with:
          targets: x86_64-unknown-linux-gnu,aarch64-apple-darwin
      - uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098  # v7.3.1
      - name: Install cargo-zigbuild
        run: uv pip install --system --break-system-packages --require-hashes -r .github/requirements-zigbuild.txt
      - name: Build (x86_64-unknown-linux-gnu)
        run: cargo build --release --target x86_64-unknown-linux-gnu
      - name: Build (aarch64-apple-darwin)
        run: cargo zigbuild --release --target aarch64-apple-darwin
      - name: Package
        run: |
          bin=$(cargo metadata --format-version=1 --no-deps \
            | jq -r '.packages[0].targets[] | select(.kind[] == "bin") | .name')
          for target in x86_64-unknown-linux-gnu aarch64-apple-darwin; do
            tar czf "${bin}-${GITHUB_REF_NAME}-${target}.tar.gz" \
              -C "target/${target}/release" "$bin"
          done
          sha256sum *.tar.gz > checksums-sha256.txt
      - uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-path: '*.tar.gz'
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "$GITHUB_REF_NAME"
          --repo "$GITHUB_REPOSITORY"
          --generate-notes
          *.tar.gz checksums-sha256.txt
