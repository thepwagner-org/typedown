# yaml-language-server: $schema=../schema.json
description: Future possibilities and explicit non-goals for a project.
paths:
  - "**/ROADMAP.md"

structure:
  title: Roadmap
  strict_sections: false
  validate_all_links: false
  sections:
    - title: Non-Goals
      required: true
      paragraph: true
      intro_text: "Explicitly out of scope to keep the project focused:"
