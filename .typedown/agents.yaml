# yaml-language-server: $schema=../schema.json
description: Agent instruction file (AGENTS.md). Size-limited; managed Related Documents section.
paths:
  - "**/AGENTS.md"

structure:
  title: none
  strict_sections: false
  validate_all_links: false
  size_warning: 4000
  sections:
    - title: Related Documents
      paragraph: true
      managed_content:
        template: |
          ## Related Documents

          - **journal/** - Daily notes in `YYYY-MM.md` files. Log design discussions, investigations, and decisions with `## YYYY-MM-DD` headings.
          - **ROADMAP.md** - Future possibilities and explicit non-goals. Update when brainstorming; don't track completed work here.
          - **AGENTS.md** - How to work on the project: architecture, commands, lints. Keep concise.
          - **../knowledge/** - Personal knowledge base. Read `AGENTS.md` there for structure; schemas in `.typedown/`.
        migrate_from:
          - Journal
          - Roadmap
